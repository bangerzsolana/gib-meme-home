<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gib Meme</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'LuckiestGuy';
      src: url('./assets/fonts/LuckiestGuy-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #041c20;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* ── FROG / VIDEO BACKGROUND ── */
    .frog-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      z-index: 0;
      pointer-events: none;
    }

    /* Dark gradient rising from bottom, fading to transparent */
    .bottom-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 72%;
      background: linear-gradient(to top,
        rgba(4, 22, 26, 1.0)   0%,
        rgba(4, 22, 26, 0.92) 25%,
        rgba(4, 22, 26, 0.65) 55%,
        transparent 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* ── CONTENT — pinned to bottom ── */
    .hero-content {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 36px;
      gap: 8px;
    }

    /* ── "the" PILL ── */
    .title-the {
      background: rgba(95, 213, 247, 0.5);
      border-radius: 50px;
      padding: 6px 22px 4px;
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 5.5vw;
      letter-spacing: 1px;
      color: #fff;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* ── MEMECOIN / TRADING CARD ── */
    .title-main {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 13.5vw;
      line-height: 0.95;
      letter-spacing: 1px;
      text-align: center;
      padding-top: 8px;
      background: linear-gradient(160deg, #00F5FF 0%, #b29bf4 55%, #FE8CFA 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.45));
    }

    /* ── "GAME" on rotated purple rectangle ── */
    .title-game-wrap {
      display: flex;
      justify-content: center;
      margin-top: 2px;
      margin-bottom: 4px;
    }

    .title-game {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #9b72f5;
      padding: 8px 32px 6px;
      border-radius: 6px;
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 12vw;
      letter-spacing: 3px;
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
      animation: wiggle 5s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%   { transform: rotate(-3deg); }
      50%  { transform: rotate(2.5deg); }
      100% { transform: rotate(-3deg); }
    }

    /* ── STATS ── */
    .stats-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 4px;
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-num {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 10vw;
      line-height: 1;
      letter-spacing: -1px;
    }

    .stat:first-child .stat-num { color: #fff; }
    .stat:last-child  .stat-num { color: #fff; }

    .stat-label {
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 3px;
    }

    .stats-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      flex-shrink: 0;
      margin: 0 8px;
      margin-bottom: 18px;
    }

    /* ── PLAY NOW ── */
    .btn-play {
      display: block;
      width: 100%;
      background: #2dd632;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 19px;
      letter-spacing: 0.5px;
      text-align: center;
      text-decoration: none;
      padding: 18px;
      border-radius: 50px;
      border: 2.5px solid #101010;
      box-shadow: 0 5px 0 #0a3b0c, 3px 8px 0 rgba(0,0,0,0.35);
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-play:active {
      transform: translateY(5px);
      box-shadow: none;
    }

    .btn-play::after {
      content: '';
      position: absolute;
      top: 0; left: -75%;
      width: 50%; height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
      transform: skewX(-20deg);
      animation: shine 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0%   { left: -75%; opacity: 1; }
      50%  { left: 125%; opacity: 1; }
      51%  { opacity: 0; }
      100% { left: 125%; opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="page">

    <img class="frog-bg" src="./assets/gm-frogie.png" alt="" aria-hidden="true" />
    <div class="bottom-fade"></div>

    <div class="hero-content">

      <div class="title-the">the</div>

      <div class="title-main">
        MEMECOIN<br>TRADING CARD
      </div>

      <div class="title-game-wrap">
        <div class="title-game">GAME</div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-num" data-target="100" data-prefix="$" data-suffix="K">$100K</div>
          <div class="stat-label">Prize Pool</div>
        </div>
        <div class="stats-dot"></div>
        <div class="stat">
          <div class="stat-num" data-target="60" data-suffix="K+">60K+</div>
          <div class="stat-label">Cards</div>
        </div>
      </div>

      <a href="https://gib.meme/" class="btn-play">Play Now</a>

    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-target]').forEach(el => {
        const target = parseInt(el.dataset.target);
        const prefix = el.dataset.prefix || '';
        const suffix = el.dataset.suffix || '';
        const duration = 1600;
        const start = performance.now();
        const tick = now => {
          const p = Math.min((now - start) / duration, 1);
          el.textContent = prefix + Math.round((1 - Math.pow(1 - p, 3)) * target) + suffix;
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      });
    });
  </script>
</body>
</html>
