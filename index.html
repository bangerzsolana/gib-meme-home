<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gib Meme — A Memecoin Trading Card Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'LuckiestGuy';
      src: url('./assets/fonts/LuckiestGuy-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #101010;
      --play-green: #2dd632;
      --teal: #5FD5F7;
      --lime: #C1F283;
      --purple: #b29bf4;
      --gold: #FFD700;
    }

    html, body {
      font-family: 'Inter', sans-serif;
      color: #fff;
      overflow-x: hidden;
      background: linear-gradient(160deg, #052535 0%, #091640 45%, #100728 100%);
    }

    /* ── HERO ────────────────────────────────────────── */
    .hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Frog as full-screen background */
    .frog-bg {
      position: absolute;
      height: 135vh;
      width: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -48%);
      z-index: 0;
      filter: drop-shadow(0 0 80px rgba(45, 214, 50, 0.2));
      animation: float 4.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -48%) rotate(-0.5deg); }
      50%       { transform: translate(-50%, -52%) rotate(0.5deg); }
    }

    /* Subtle vignette so text reads over the frog */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 100%, rgba(5, 18, 45, 0.85) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 0%,   rgba(5, 18, 45, 0.5)  0%, transparent 50%);
      z-index: 1;
      pointer-events: none;
    }

    /* Text + button overlay */
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding: 0 24px;
    }

    .hero-title {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: clamp(48px, 6.5vw, 96px);
      line-height: 1.0;
      color: #fff;
      text-shadow:
        5px 5px 0 rgba(0,0,0,0.7),
        0 0 80px rgba(95, 213, 247, 0.25);
      letter-spacing: 2px;
    }

    .hero-title .accent { color: #5FD5F7; }

    .btn-play-hero {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      background: var(--play-green);
      color: #000;
      border: 2.5px solid var(--black);
      border-radius: 50px;
      box-shadow: 6px 5px 0 var(--black);
      padding: 18px 64px;
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-play-hero:hover  { transform: translate(-2px, -2px); box-shadow: 8px 7px 0 var(--black); }
    .btn-play-hero:active { transform: translate(6px, 5px); box-shadow: none; }

    /* ── STATS ───────────────────────────────────────── */
    .stats-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 64px 48px 96px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    .stat-box {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 36px 24px 32px;
      text-align: center;
      cursor: default;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s, border-color 0.25s, background 0.25s;
      position: relative;
      overflow: hidden;
    }

    .stat-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 22px 22px 0 0;
    }
    .stat-box:nth-child(1)::before { background: var(--teal); }
    .stat-box:nth-child(2)::before { background: var(--purple); }
    .stat-box:nth-child(3)::before { background: var(--lime); }
    .stat-box:nth-child(4)::before { background: var(--gold); }

    .stat-box:hover { transform: translateY(-8px); background: rgba(255,255,255,0.1); }
    .stat-box:nth-child(1):hover { border-color: rgba(95,213,247,0.5);  box-shadow: 0 16px 48px rgba(95,213,247,0.14); }
    .stat-box:nth-child(2):hover { border-color: rgba(178,155,244,0.5); box-shadow: 0 16px 48px rgba(178,155,244,0.14); }
    .stat-box:nth-child(3):hover { border-color: rgba(193,242,131,0.5); box-shadow: 0 16px 48px rgba(193,242,131,0.14); }
    .stat-box:nth-child(4):hover { border-color: rgba(255,215,0,0.5);   box-shadow: 0 16px 48px rgba(255,215,0,0.14); }

    .stat-icon {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
    }

    .stat-number {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 52px;
      line-height: 1;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .stat-box:nth-child(1) .stat-number { color: var(--teal); }
    .stat-box:nth-child(2) .stat-number { color: var(--purple); }
    .stat-box:nth-child(3) .stat-number { color: var(--lime); }
    .stat-box:nth-child(4) .stat-number { color: var(--gold); }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
  </style>
</head>
<body>

  <!-- HERO: frog fills the screen, text centered on top -->
  <section class="hero">
    <img class="frog-bg" src="./assets/gm-frogie.png" alt="" aria-hidden="true" />
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title">
        A Gib Meme Coin<br>
        <span class="accent">Trading Card</span><br>
        Game
      </h1>
      <a href="#" class="btn-play-hero">Play Now</a>
    </div>
  </section>

  <!-- STATS -->
  <section class="stats-section">
    <div class="stats-grid">
      <div class="stat-box">
        <span class="stat-icon">🃏</span>
        <div class="stat-number" data-target="60" data-suffix="K">60K</div>
        <div class="stat-label">Cards in Play</div>
      </div>
      <div class="stat-box">
        <span class="stat-icon">🔄</span>
        <div class="stat-number" data-target="22" data-suffix="K">22K</div>
        <div class="stat-label">Secondary Sales</div>
      </div>
      <div class="stat-box">
        <span class="stat-icon">💰</span>
        <div class="stat-number" data-target="33" data-prefix="$" data-suffix="K">$33K</div>
        <div class="stat-label">Rewards Distributed</div>
      </div>
      <div class="stat-box">
        <span class="stat-icon">🏆</span>
        <div class="stat-number" data-target="100" data-prefix="$" data-suffix="K">$100K</div>
        <div class="stat-label">Prize Pool</div>
      </div>
    </div>
  </section>

  <script>
    // Animated counters — trigger when scrolled into view
    const counters = document.querySelectorAll('.stat-number[data-target]');

    const animateCounter = (el) => {
      const target = parseInt(el.dataset.target);
      const prefix = el.dataset.prefix || '';
      const suffix = el.dataset.suffix || '';
      const duration = 1400;
      const start = performance.now();
      const tick = (now) => {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = prefix + Math.round(eased * target) + suffix;
        if (progress < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          animateCounter(entry.target);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });

    counters.forEach(el => observer.observe(el));
  </script>

</body>
</html>
