<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gib Meme — The Memecoin Trading Card Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'LuckiestGuy';
      src: url('./assets/fonts/LuckiestGuy-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #101010;
      --play-green: #2dd632;
    }

    html, body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    /* ── PAGE ── */
    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(160deg, #070e2a 0%, #0d1440 50%, #120828 100%);
    }

    /* ── PARTICLES ── */
    #particles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── FROG / VIDEO ── */
    .frog-bg {
      position: absolute;
      height: 120%;
      width: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -54%);
      z-index: 2;
      pointer-events: none;
      animation: float 4.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -54%) rotate(-0.5deg); }
      50%       { transform: translate(-50%, -58%) rotate(0.5deg); }
    }

    /* Radial glow behind frog */
    .frog-glow {
      position: absolute;
      width: 800px;
      height: 800px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -62%);
      background: radial-gradient(circle,
        rgba(168, 85, 247, 0.14) 0%,
        rgba(95, 213, 247, 0.07) 45%,
        transparent 70%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* ── GRADIENT OVERLAYS ── */
    .bottom-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 62%;
      background: linear-gradient(to top,
        rgba(7, 14, 42, 0.97) 0%,
        rgba(7, 14, 42, 0.75) 38%,
        transparent 100%
      );
      z-index: 3;
      pointer-events: none;
    }

    .top-fade {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 22%;
      background: linear-gradient(to bottom, rgba(7, 14, 42, 0.45) 0%, transparent 100%);
      z-index: 3;
      pointer-events: none;
    }

    /* ── HERO CONTENT ── */
    .hero-content {
      position: absolute;
      z-index: 4;
      left: 50%;
      bottom: 5%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 960px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ── HEADLINE ── */
    /* Wrap in a padded container so filter:drop-shadow has room to render
       without being clipped by .page's overflow:hidden */
    .hero-title-wrap {
      padding: 28px 32px 4px;
    }

    .hero-title {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: clamp(28px, 3.8vw, 58px);
      line-height: 1.05;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #c084fc 0%, #a855f7 28%, #7c3aed 55%, #38bdf8 80%, #5FD5F7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter:
        drop-shadow(0 0 1px rgba(255,255,255,0.85))
        drop-shadow(0 0 3px rgba(255,255,255,0.5))
        drop-shadow(0 0 18px rgba(168, 85, 247, 0.65))
        drop-shadow(0 0 36px rgba(95, 213, 247, 0.3))
        drop-shadow(0 5px 14px rgba(0,0,0,0.95));
      /* Allow wrapping — prevents horizontal overflow clipping */
      white-space: normal;
      position: relative;
      display: block;
    }

    .hero-title::after {
      content: attr(data-text);
      position: absolute;
      left: 0; top: 0;
      font: inherit;
      letter-spacing: inherit;
      background: linear-gradient(
        105deg,
        transparent 0%,
        transparent 38%,
        rgba(255,255,255,0.0) 44%,
        rgba(255,255,255,0.65) 50%,
        rgba(255,255,255,0.0) 56%,
        transparent 62%,
        transparent 100%
      );
      background-size: 250% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: text-shine 3.2s linear infinite;
      pointer-events: none;
      filter: none;
      width: 100%;
    }

    @keyframes text-shine {
      from { background-position: 100% center; }
      to   { background-position: -100% center; }
    }

    /* ── PLAY BUTTON ── */
    .btn-play-hero {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      background: var(--play-green);
      color: #000;
      border: 2.5px solid var(--black);
      border-radius: 50px;
      /* Bottom shadow gives depth/press feel; side shadow gives the offset comic look */
      box-shadow:
        0 7px 0 #0b4010,
        6px 12px 0 rgba(0,0,0,0.5);
      padding: 18px 80px;
      cursor: pointer;
      transition: transform 0.12s cubic-bezier(.34,1.56,.64,1), box-shadow 0.12s;
      text-decoration: none;
      display: inline-block;
      position: relative;
      overflow: hidden;
    }

    .btn-play-hero:hover {
      transform: translate(-2px, -5px);
      box-shadow:
        0 12px 0 #0b4010,
        8px 17px 0 rgba(0,0,0,0.45);
    }

    .btn-play-hero:active {
      transform: translate(4px, 7px);
      box-shadow: none;
    }

    /* Shine sweep — kept from before */
    .btn-play-hero::after {
      content: '';
      position: absolute;
      top: 0; left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
      transform: skewX(-20deg);
      animation: btn-shine 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes btn-shine {
      0%   { left: -75%; opacity: 1; }
      50%  { left: 125%; opacity: 1; }
      51%  { opacity: 0; }
      100% { left: 125%; opacity: 0; }
    }

    /* ── SUBLINE ── */
    .hero-subline {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }

    .hero-subline .hl { color: rgba(95, 213, 247, 0.65); }

    /* ── STAT CARDS (2 big ones) ── */
    .stats-duo {
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 20px;
      margin-top: 4px;
    }

    .stat-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 18px 40px 16px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s, border-color 0.25s;
      min-width: 180px;
    }

    /* Top accent bar */
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 20px 20px 0 0;
    }

    .stat-card.cards::before  { background: #5FD5F7; }
    .stat-card.prize::before  { background: #FFD700; }

    .stat-card.cards:hover { transform: translateY(-6px); border-color: rgba(95,213,247,0.5); box-shadow: 0 16px 40px rgba(95,213,247,0.18), 0 0 0 1px rgba(95,213,247,0.15); }
    .stat-card.prize:hover { transform: translateY(-6px); border-color: rgba(255,215,0,0.5);  box-shadow: 0 16px 40px rgba(255,215,0,0.18),  0 0 0 1px rgba(255,215,0,0.15); }

    .stat-card-icon {
      font-size: 22px;
      line-height: 1;
    }

    .stat-card-number {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 52px;
      line-height: 1;
      letter-spacing: 2px;
    }

    .stat-card.cards .stat-card-number { color: #5FD5F7; }
    .stat-card.prize .stat-card-number  { color: #FFD700; }

    .stat-card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: rgba(255,255,255,0.45);
    }
  </style>
</head>
<body>

  <div class="page">

    <canvas id="particles"></canvas>

    <div class="frog-glow"></div>
    <img class="frog-bg" src="./assets/gm-frogie.png" alt="" aria-hidden="true" />

    <div class="top-fade"></div>
    <div class="bottom-fade"></div>

    <div class="hero-content">

      <div class="hero-title-wrap">
        <h1 class="hero-title"
            data-text="The Memecoin Trading Card Game">
          The Memecoin Trading Card Game
        </h1>
      </div>

      <a href="https://gib.meme/" class="btn-play-hero">Play Now</a>

      <p class="hero-subline">
        Compete for Real Prizes &nbsp;•&nbsp; <span class="hl">Win Real Rewards</span>
      </p>

      <div class="stats-duo">
        <div class="stat-card cards">
          <span class="stat-card-icon">🃏</span>
          <div class="stat-card-number" data-target="60" data-suffix="K">60K</div>
          <div class="stat-card-label">Cards in Play</div>
        </div>
        <div class="stat-card prize">
          <span class="stat-card-icon">🏆</span>
          <div class="stat-card-number" data-target="100" data-prefix="$" data-suffix="K">$100K</div>
          <div class="stat-card-label">Prize Pool</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── Particles ──
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    window.addEventListener('resize', resize);
    resize();

    const rand = (a, b) => Math.random() * (b - a) + a;

    class Particle {
      constructor() { this.reset(true); }
      reset(initial = false) {
        this.x = rand(0, canvas.width);
        this.y = initial ? rand(0, canvas.height) : canvas.height + 8;
        this.r = rand(0.8, 2.2);
        this.vy = rand(0.15, 0.55);
        this.vx = rand(-0.15, 0.15);
        this.alpha = rand(0.15, 0.55);
        this.da = rand(0.003, 0.007) * (Math.random() > 0.5 ? 1 : -1);
        this.col = Math.random() > 0.5 ? '95,213,247' : '192,132,252';
      }
      tick() {
        this.y -= this.vy;
        this.x += this.vx;
        this.alpha += this.da;
        if (this.alpha > 0.55 || this.alpha < 0.08) this.da *= -1;
        if (this.y < -8) this.reset();
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.col},${this.alpha})`;
        ctx.fill();
      }
    }

    const pts = Array.from({ length: 45 }, () => new Particle());

    (function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pts.forEach(p => { p.tick(); p.draw(); });
      requestAnimationFrame(loop);
    })();

    // ── Count-up ──
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.stat-card-number[data-target]').forEach(el => {
        const target = parseInt(el.dataset.target);
        const prefix = el.dataset.prefix || '';
        const suffix = el.dataset.suffix || '';
        const duration = 1600;
        const start = performance.now();
        const tick = now => {
          const p = Math.min((now - start) / duration, 1);
          el.textContent = prefix + Math.round((1 - Math.pow(1 - p, 3)) * target) + suffix;
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      });
    });
  </script>

</body>
</html>
