<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gib Meme — A Memecoin Trading Card Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'LuckiestGuy';
      src: url('./assets/fonts/LuckiestGuy-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #101010;
      --play-green: #2dd632;
      --teal: #5FD5F7;
      --lime: #C1F283;
      --purple: #b29bf4;
      --gold: #FFD700;
    }

    html, body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #fff;
    }

    /* ── ONE FULL-SCREEN CANVAS ── */
    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(160deg, #052535 0%, #091640 45%, #100728 100%);
    }

    /* Frog / video background */
    .frog-bg {
      position: absolute;
      height: 130%;
      width: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -48%);
      z-index: 0;
      filter: drop-shadow(0 0 80px rgba(45, 214, 50, 0.2));
      animation: float 4.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -48%) rotate(-0.5deg); }
      50%       { transform: translate(-50%, -52%) rotate(0.5deg); }
    }

    /* Bottom gradient fade — stats sit on top of this */
    .bottom-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 52%;
      background: linear-gradient(to top, rgba(6, 14, 40, 0.92) 0%, rgba(6, 14, 40, 0.6) 40%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* Top vignette for text readability */
    .top-fade {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(to bottom, rgba(5, 18, 45, 0.45) 0%, transparent 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* ── HERO TEXT — centered, lower half ── */
    .hero-content {
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: 32%;
      transform: translateX(-50%);
      width: 60%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .hero-title {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: clamp(32px, 4.2vw, 64px);
      line-height: 1.05;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    /* paint-order: stroke fill — stroke draws first, opaque fill covers the inner half,
       leaving only the outside portion of the stroke visible. */

    /* "A" and "Game" — light blue fill, white outside stroke */
    .title-plain {
      color: #a8e8ff;
      -webkit-text-stroke: 10px #fff;
      paint-order: stroke fill;
    }

    /* "Memecoin Trading Card" — bright purple fill, dark purple outside stroke,
       shine overlay via ::after pseudo-element (renders on top of the solid fill) */
    .title-accent {
      color: #c084fc;
      -webkit-text-stroke: 10px #3b1d8a;
      paint-order: stroke fill;
      display: inline-block;
      position: relative;
    }

    /* Shine sweeps across as a white gradient overlay clipped to the text shape */
    .title-accent::after {
      content: attr(data-text);
      position: absolute;
      left: 0; top: 0;
      font: inherit;
      letter-spacing: inherit;
      white-space: nowrap;
      -webkit-text-stroke: 0;
      background: linear-gradient(
        100deg,
        transparent 0%,
        transparent 38%,
        rgba(255,255,255,0.0) 44%,
        rgba(255,255,255,0.75) 50%,
        rgba(255,255,255,0.0) 56%,
        transparent 62%,
        transparent 100%
      );
      background-size: 250% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: text-shine 2.6s linear infinite;
      pointer-events: none;
    }

    @keyframes text-shine {
      from { background-position: 100% center; }
      to   { background-position: -100% center; }
    }

    .btn-play-hero {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
      background: var(--play-green);
      color: #000;
      border: 2.5px solid var(--black);
      border-radius: 50px;
      box-shadow: 5px 4px 0 var(--black);
      padding: 14px 52px;
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.08s;
      text-decoration: none;
      display: inline-block;
      position: relative;
      overflow: hidden;
    }
    .btn-play-hero:hover  { transform: translate(-2px, -2px); box-shadow: 7px 6px 0 var(--black); }
    .btn-play-hero:active { transform: translate(5px, 4px); box-shadow: none; }

    .btn-play-hero::after {
      content: '';
      position: absolute;
      top: 0; left: -75%;
      width: 50%;
      height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.55) 50%, transparent 100%);
      transform: skewX(-20deg);
      animation: shine 2.8s ease-in-out infinite;
      border-radius: inherit;
      pointer-events: none;
    }

    @keyframes shine {
      0%   { left: -75%; opacity: 1; }
      50%  { left: 125%; opacity: 1; }
      51%  { opacity: 0; }
      100% { left: 125%; opacity: 0; }
    }

    /* ── STATS — pinned to bottom, overlaying the gradient ── */
    .stats-grid {
      position: absolute;
      z-index: 2;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .stat-box {
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 18px 16px 16px;
      text-align: center;
      cursor: default;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s, border-color 0.25s;
      position: relative;
      overflow: hidden;
      /* No background fill — lets the gradient show through */
      background: transparent;
    }

    .stat-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 22px 22px 0 0;
    }
    .stat-box:nth-child(1)::before { background: var(--teal); }
    .stat-box:nth-child(2)::before { background: var(--purple); }
    .stat-box:nth-child(3)::before { background: var(--lime); }
    .stat-box:nth-child(4)::before { background: var(--gold); }

    .stat-box:hover { transform: translateY(-6px); }
    .stat-box:nth-child(1):hover { border-color: rgba(95,213,247,0.5);  box-shadow: 0 12px 40px rgba(95,213,247,0.15); }
    .stat-box:nth-child(2):hover { border-color: rgba(178,155,244,0.5); box-shadow: 0 12px 40px rgba(178,155,244,0.15); }
    .stat-box:nth-child(3):hover { border-color: rgba(193,242,131,0.5); box-shadow: 0 12px 40px rgba(193,242,131,0.15); }
    .stat-box:nth-child(4):hover { border-color: rgba(255,215,0,0.5);   box-shadow: 0 12px 40px rgba(255,215,0,0.15); }

    .stat-number {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 36px;
      line-height: 1;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }
    .stat-box:nth-child(1) .stat-number { color: var(--teal); }
    .stat-box:nth-child(2) .stat-number { color: var(--purple); }
    .stat-box:nth-child(3) .stat-number { color: var(--lime); }
    .stat-box:nth-child(4) .stat-number { color: var(--gold); }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- Background: frog (swap src for video later) -->
    <img class="frog-bg" src="./assets/gm-frogie.png" alt="" aria-hidden="true" />

    <!-- Gradient overlays -->
    <div class="top-fade"></div>
    <div class="bottom-fade"></div>

    <!-- Hero text + CTA -->
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="title-plain">A</span> <span class="title-accent" data-text="Memecoin Trading Card">Memecoin Trading Card</span> <span class="title-plain">Game</span>
      </h1>
      <a href="#" class="btn-play-hero">Play Now</a>
    </div>

    <!-- Stats floating over the bottom gradient -->
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-number" data-target="60" data-suffix="K">60K</div>
        <div class="stat-label">Cards in Play</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" data-target="22" data-suffix="K">22K</div>
        <div class="stat-label">Secondary Sales</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" data-target="33" data-prefix="$" data-suffix="K">$33K</div>
        <div class="stat-label">Rewards Distributed</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" data-target="100" data-prefix="$" data-suffix="K">$100K</div>
        <div class="stat-label">Prize Pool</div>
      </div>
    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.stat-number[data-target]').forEach(el => {
        const target = parseInt(el.dataset.target);
        const prefix = el.dataset.prefix || '';
        const suffix = el.dataset.suffix || '';
        const duration = 1400;
        const start = performance.now();
        const tick = (now) => {
          const progress = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = prefix + Math.round(eased * target) + suffix;
          if (progress < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      });
    });
  </script>

</body>
</html>
