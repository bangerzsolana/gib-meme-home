<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gib Meme</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'LuckiestGuy';
      src: url('./assets/fonts/LuckiestGuy-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #041c20;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow-x: hidden; /* prevents sword/arrow entrance from creating scrollbar */
      /* No overflow-y:hidden — that was causing MEMECOIN to be clipped */
    }

    /* ── FROG / VIDEO BACKGROUND ── */
    .frog-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      z-index: 0;
      pointer-events: none;
    }

    /* Dark gradient rising from bottom, fading to transparent */
    .bottom-fade {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 72%;
      background: linear-gradient(to top,
        rgba(4, 22, 26, 1.0)   0%,
        rgba(4, 22, 26, 0.92) 25%,
        rgba(4, 22, 26, 0.65) 55%,
        transparent 100%
      );
      z-index: 1;
      pointer-events: none;
    }

    /* ── CONTENT — full-height flex, content pushed to bottom ── */
    /* Using top:0/bottom:0 + justify-content:flex-end so the flex container
       is always exactly 100vh. Content stacks upward from the bottom and can
       never escape the top boundary — permanently prevents MEMECOIN clipping. */
    .hero-content {
      position: absolute;
      top: 0; bottom: 0;
      left: 0; right: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 16px 16px;
      gap: 4px;
    }

    /* ── "the" PILL ── */
    .title-the {
      background: rgba(95, 213, 247, 0.5);
      border-radius: 50px;
      padding: 4px 22px;
      font-family: 'LuckiestGuy', sans-serif;
      font-size: min(5.5vw, 3.5vh);
      letter-spacing: 1px;
      color: #fff;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    /* LuckiestGuy has ~0.2em of dead space above the cap height in its em box.
       Flex centers the em box, not the visual glyph — so text appears to float high.
       Nudge the text down to optically center it inside the pill/box. */
    .title-the-text,
    .title-game-text {
      position: relative;
      top: 0.12em;
    }

    /* ── MEMECOIN / TRADING CARD ── */
    .title-main-wrap {
      position: relative;
      padding: 4px 4px 2px;
    }
    .title-main-shadow {
      position: absolute;
      top: 4px; left: 4px; right: 4px;
      font-family: 'LuckiestGuy', sans-serif;
      font-size: min(10.5vw, 7vh);
      /* KEEP line-height ≥ 1.1 — DO NOT lower this.
         LuckiestGuy glyphs taller than the em box. background-clip:text
         only paints the gradient inside the line box, so anything below
         ~1.0 makes the tops of the glyphs invisible (appears clipped). */
      line-height: 1.15;
      letter-spacing: 1px;
      text-align: center;
      color: #ffffff;
      animation: shadow-bob 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shadow-bob {
      0%   { transform: translateY(0); }
      50%  { transform: translateY(5px); }
      100% { transform: translateY(0); }
    }
    .title-main {
      position: relative;
      z-index: 1;
      font-family: 'LuckiestGuy', sans-serif;
      /* KEEP line-height ≥ 1.1 — DO NOT lower this.
         With -webkit-text-fill-color:transparent + background-clip:text,
         the gradient only renders inside the line box. LuckiestGuy glyphs
         extend above the box at low line-heights — top of MEMECOIN goes
         invisible. Took ~20 commits to diagnose. Don't touch this. */
      font-size: min(10.5vw, 7vh);
      line-height: 1.15;
      letter-spacing: 1px;
      text-align: center;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%) -200% 0 / 50% 100% no-repeat,
        linear-gradient(160deg, #00F5FF 0%, #b29bf4 55%, #FE8CFA 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: title-shine 3.5s ease-in-out infinite;
    }
    @keyframes title-shine {
      0%   { background-position: -200% 0, 0 0; }
      50%  { background-position: 300% 0, 0 0; }
      51%  { background-position: -200% 0, 0 0; opacity: 1; }
      100% { background-position: -200% 0, 0 0; }
    }

    /* ── "GAME" on rotated purple rectangle ── */
    .title-game-wrap {
      display: flex;
      justify-content: center;
      margin-top: 0px;
      margin-bottom: 4px;
    }

    .title-game {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #9b72f5;
      padding: 5px 24px;
      border-radius: 6px;
      font-family: 'LuckiestGuy', sans-serif;
      font-size: min(5vw, 3.5vh);
      line-height: 1;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
      animation: wiggle 5s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%   { transform: rotate(-3deg); }
      50%  { transform: rotate(2.5deg); }
      100% { transform: rotate(-3deg); }
    }

    /* ── STATS ── */
    .stats-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 4px;
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-num {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: min(4.5vw, 3vh);
      line-height: 1;
      letter-spacing: -1px;
    }

    .stat:first-child .stat-num { color: #fff; }
    .stat:last-child  .stat-num { color: #fff; }

    .stat-symbol {
      font-size: 0.5em;
      color: rgba(255,255,255,0.45);
      display: inline-block;
      transform: rotate(-10deg);
      position: relative;
      top: -0.15em;
      margin-right: 1px;
    }
    .stat-symbol-suffix {
      font-size: 0.5em;
      color: rgba(255,255,255,0.45);
      display: inline-block;
      transform: rotate(10deg);
      position: relative;
      top: -0.15em;
      margin-left: 1px;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 3px;
    }

    .stats-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      flex-shrink: 0;
      margin: 0 8px;
      margin-bottom: 18px;
    }

    /* ── PLAY NOW ── */
    .btn-play {
      display: block;
      width: 100%;
      background: #2dd632;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 19px;
      letter-spacing: 0.5px;
      text-align: center;
      text-decoration: none;
      padding: 18px;
      border-radius: 50px;
      border: 2.5px solid #101010;
      box-shadow: 0 5px 0 #0a3b0c, 3px 8px 0 rgba(0,0,0,0.35);
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-play:active {
      transform: translateY(5px);
      box-shadow: none;
    }

    .btn-play::after {
      content: '';
      position: absolute;
      top: 0; left: -75%;
      width: 50%; height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.5) 50%, transparent 100%);
      transform: skewX(-20deg);
      animation: shine 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0%   { left: -75%; opacity: 1; }
      50%  { left: 125%; opacity: 1; }
      51%  { opacity: 0; }
      100% { left: 125%; opacity: 0; }
    }

    /* ── TITLE AREA — multi-frame switcher ── */
    .title-area {
      position: relative;
      width: 100%;
    }

    .frame {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    /* Frame 1 is in normal flow — its height drives the title-area */
    .frame-1 {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }
    .frame-1.exiting {
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
    }

    /* Frames 2+ layer on top, absolutely positioned so they don't shift layout */
    .frame-abs {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      opacity: 0;
      transform: scale(0.95);
      pointer-events: none;
    }
    .frame-abs.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    /* ── FRAME 2: BUILD DECKS ── */
    .title-build {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: min(10.5vw, 7vh);
      /* KEEP line-height ≥ 1.1 — same background-clip:text clipping risk as .title-main */
      line-height: 1.15;
      letter-spacing: 1px;
      text-align: center;
      color: #ffffff;
    }

    /* Tighten frame-2 — zero gap, then pull battle scene up with negative margin */
    .frame-2 { gap: 0; }
    .frame-2 .title-battle-scene { margin-top: -10px; }

    /* ── BATTLE SCENE ── */
    .title-battle-scene {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 6px;
      overflow: visible;
    }

    .title-battle-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #c1f283;
      padding: 7px 22px;
      border-radius: 6px;
      font-family: 'LuckiestGuy', sans-serif;
      font-size: min(8.5vw, 5.5vh);
      line-height: 1;
      letter-spacing: 2px;
      color: #000000;
      white-space: nowrap;
      transform: rotate(1.3deg);
      box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
      text-shadow: 2px 2px 0 rgba(0, 80, 0, 0.45);
      animation: wiggle 5s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    .title-battle-text {
      position: relative;
      top: 0.12em;
    }

    /* ── SWORDS — flex items, naturally flanking the box ── */
    .sword {
      width: min(22vw, 14.5vh);
      display: block;
      flex-shrink: 0;
    }

    /* Swords rock ±45deg — opposite phases so they mirror each other */
    @keyframes sword-rock-cw  { 0%, 100% { transform: rotate(-45deg); } 50% { transform: rotate(45deg);  } }
    @keyframes sword-rock-ccw { 0%, 100% { transform: rotate(45deg);  } 50% { transform: rotate(-45deg); } }

    .sword-left {
      translate: 0 0;
      animation: sword-rock-cw 7s ease-in-out infinite;
      transition: translate 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s;
    }

    .sword-right {
      translate: 0 0;
      animation: sword-rock-ccw 7s ease-in-out infinite;
      transition: translate 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.35s;
    }

    .frame-2:not(.active) .sword-left {
      translate: -120vw 0;
      transition: translate 0s;
    }
    .frame-2:not(.active) .sword-right {
      translate: 120vw 0;
      transition: translate 0s;
    }

    /* ── FRAME 3: CARD POWER FOLLOWS THE MARKET ── */
    .title-card-follows {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #977efb;
      border-radius: 6px;
      padding: 6px 24px;
      font-family: 'LuckiestGuy', sans-serif;
      font-size: min(6.5vw, 4.5vh);
      line-height: 1;
      letter-spacing: 2px;
      color: #fff;
      transform: rotate(1.3deg);
      box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
    }

    .title-card-follows-text {
      position: relative;
      top: 0.12em;
    }

    .title-market-scene {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      width: 100%;
      gap: 8px;
      overflow: visible;
    }

    .title-market {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: min(10.5vw, 7vh);
      /* KEEP line-height ≥ 1.1 — same clipping risk as .title-main */
      line-height: 1.15;
      letter-spacing: 1px;
      text-align: center;
      color: #ffffff;
      white-space: nowrap;
    }

    /* ── MARKET ARROWS ── */
    .market-arrow {
      width: min(16vw, 11vh);
      display: block;
    }

    .arrow-down {
      justify-self: end;
      translate: 0 0;
      transition: translate 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s;
    }

    .arrow-up {
      justify-self: start;
      translate: 0 0;
      transition: translate 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.35s;
    }

    .frame-3:not(.active) .arrow-down {
      translate: -120vw 0;
      transition: translate 0s;
    }
    .frame-3:not(.active) .arrow-up {
      translate: 120vw 0;
      transition: translate 0s;
    }

    /* ── FRAME 4: WIN REAL REWARDS ── */

    .win-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 6px;
      overflow: visible;
    }

    /* Large outer coins, smaller inner coins */
    .coin-1, .coin-4 { width: min(17vw, 11vh); }
    .coin-2, .coin-3 { width: min(11vw,  7vh); }

    .sol-coin { display: block; flex-shrink: 0; }

    /* Explosion + WIN wrapper — both jump together */
    .win-explosion-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      animation: win-jump 1.6s ease-in-out infinite;
    }

    @keyframes win-jump {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    .explosion-img {
      width: min(28vw, 18vh);
      display: block;
      /* Rotates back and forth behind WIN */
      animation: explosion-rock 2.2s ease-in-out infinite;
    }

    @keyframes explosion-rock {
      0%, 100% { transform: rotate(-14deg); }
      50%       { transform: rotate(14deg); }
    }

    .win-text {
      position: absolute;
      font-family: 'LuckiestGuy', sans-serif;
      font-size: min(9vw, 6vh);
      /* KEEP line-height ≥ 1.1 — same background-clip:text clipping risk */
      line-height: 1.15;
      color: #977efb;
      text-shadow: 0px 4px 14px rgba(0,0,0,0.6);
      letter-spacing: 1px;
    }

    /* REAL REWARDS — same gradient + animated shine as MEMECOIN title */
    .title-real-rewards {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: min(13.5vw, 9vh);
      /* KEEP line-height ≥ 1.1 — background-clip:text clipping rule */
      line-height: 1.15;
      letter-spacing: 1px;
      text-align: center;
      white-space: nowrap;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%) -200% 0 / 50% 100% no-repeat,
        linear-gradient(160deg, #00F5FF 0%, #b29bf4 55%, #FE8CFA 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: title-shine 3.5s ease-in-out infinite;
    }

    /* Coin bob — staggered phases so they move like floating coins */
    @keyframes coin-bob {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-7px); }
    }
    .coin-1 { animation: coin-bob 2.2s ease-in-out infinite 0s;    }
    .coin-2 { animation: coin-bob 2.2s ease-in-out infinite 0.55s; }
    .coin-3 { animation: coin-bob 2.2s ease-in-out infinite 1.1s;  }
    .coin-4 { animation: coin-bob 2.2s ease-in-out infinite 1.65s; }

    /* Counter-phase bob: pink goes down as green goes up, then swap */
    @keyframes arrow-bob-down {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(8px); }
    }
    @keyframes arrow-bob-up {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
    .arrow-down { animation: arrow-bob-down 2.4s ease-in-out infinite; }
    .arrow-up   { animation: arrow-bob-up   2.4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="page">

    <img class="frog-bg" src="./assets/gm-frogie.png" alt="" aria-hidden="true" />
    <div class="bottom-fade"></div>

    <div class="hero-content">

      <div class="title-area">

        <!-- Frame 1: MEMECOIN TRADING CARD GAME -->
        <div class="frame frame-1">
          <div class="title-main-wrap">
            <div class="title-main">MEMECOIN<br>TRADING CARD</div>
          </div>
          <div class="title-game-wrap">
            <div class="title-game"><span class="title-game-text">GAME</span></div>
          </div>
        </div>

        <!-- Frame 2: BUILD DECKS TO BATTLE -->
        <div class="frame frame-2 frame-abs">
          <div class="title-build">BUILD DECKS</div>
          <div class="title-battle-scene">
            <img class="sword sword-left" src="./assets/sword-left.png" alt="" aria-hidden="true">
            <div class="title-battle-box"><span class="title-battle-text">TO BATTLE</span></div>
            <img class="sword sword-right" src="./assets/sword-right.png" alt="" aria-hidden="true">
          </div>
        </div>

        <!-- Frame 4: WIN REAL REWARDS -->
        <div class="frame frame-4 frame-abs">
          <div class="win-row">
            <img class="sol-coin coin-1" src="./assets/solcoin1.png" alt="" aria-hidden="true">
            <img class="sol-coin coin-2" src="./assets/solcoin2.png" alt="" aria-hidden="true">
            <div class="win-explosion-wrap">
              <img class="explosion-img" src="./assets/explosion.png" alt="" aria-hidden="true">
              <span class="win-text">WIN</span>
            </div>
            <img class="sol-coin coin-3" src="./assets/solcoin3.png" alt="" aria-hidden="true">
            <img class="sol-coin coin-4" src="./assets/solcoin4.png" alt="" aria-hidden="true">
          </div>
          <div class="title-real-rewards">REAL REWARDS</div>
        </div>

        <!-- Frame 3: CARD POWER FOLLOWS THE MARKET -->
        <div class="frame frame-3 frame-abs">
          <div class="title-card-follows"><span class="title-card-follows-text">CARD POWER FOLLOWS</span></div>
          <div class="title-market-scene">
            <img class="market-arrow arrow-down" src="./assets/arrow-down.png" alt="" aria-hidden="true">
            <div class="title-market">THE MARKET</div>
            <img class="market-arrow arrow-up" src="./assets/arrow-up.png" alt="" aria-hidden="true">
          </div>
        </div>

      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-num" data-target="100" data-prefix="$" data-suffix="K"><span class="stat-symbol">$</span>100K</div>
          <div class="stat-label">Prize Pool</div>
        </div>
        <div class="stats-dot"></div>
        <div class="stat">
          <div class="stat-num" data-target="60" data-suffix="K+">60K<span class="stat-symbol-suffix">+</span></div>
          <div class="stat-label">Cards</div>
        </div>
      </div>

      <a href="https://gib.meme/" class="btn-play">Play Now</a>

    </div>
  </div>

  <script>
    // ── TEXT FRAME CYCLING — 5 seconds per frame ──
    document.addEventListener('DOMContentLoaded', () => {
      const frames = [
        { el: document.querySelector('.frame-1'), base: true },
        { el: document.querySelector('.frame-2'), base: false },
        { el: document.querySelector('.frame-3'), base: false },
        { el: document.querySelector('.frame-4'), base: false },
      ];
      let current = 0;
      setInterval(() => {
        const out = frames[current];
        current = (current + 1) % frames.length;
        const into = frames[current];
        // Exit outgoing frame
        if (out.base) out.el.classList.add('exiting');
        else out.el.classList.remove('active');
        // Enter incoming frame
        if (into.base) into.el.classList.remove('exiting');
        else into.el.classList.add('active');
      }, 5000);
    });

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-target]').forEach(el => {
        const target = parseInt(el.dataset.target);
        const prefix = el.dataset.prefix || '';
        const suffix = el.dataset.suffix || '';
        const duration = 1600;
        const start = performance.now();
        const prefixHtml = prefix ? '<span class="stat-symbol">' + prefix + '</span>' : '';
        const suffixClass = suffix.includes('+') ? 'stat-symbol-suffix' : '';
        const suffixMain = suffix.replace('+', '');
        const suffixExtra = suffix.includes('+') ? '<span class="stat-symbol-suffix">+</span>' : '';
        const tick = now => {
          const p = Math.min((now - start) / duration, 1);
          const val = Math.round((1 - Math.pow(1 - p, 3)) * target);
          el.innerHTML = prefixHtml + val + suffixMain + suffixExtra;
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      });
    });
  </script>
</body>
</html>
