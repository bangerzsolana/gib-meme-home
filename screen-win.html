<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>Gib Meme — Win</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'LuckiestGuy';
      src: url('./assets/fonts/LuckiestGuy-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to bottom,
        #b8dada 0%,
        #5a9898 35%,
        #1e5050 65%,
        #0d2e2e 100%
      );
    }

    /* ── CONTENT — bottom-anchored ── */
    .hero-content {
      position: absolute;
      top: 0; bottom: 0;
      left: 0; right: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 16px 16px;
      gap: 4px;
    }

    /* ── WIN STARBURST ── */
    .win-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 180px;
      margin-bottom: 8px;
    }

    .win-star {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .win-text {
      position: relative;
      z-index: 1;
      font-family: 'LuckiestGuy', sans-serif;
      font-size: 52px;
      color: #00f5c8;
      letter-spacing: 4px;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.25);
    }

    /* ── REAL REWARDS ── */
    .real-rewards {
      font-family: 'LuckiestGuy', sans-serif;
      font-size: min(13.5vw, 8vh);
      line-height: 0.95;
      letter-spacing: 2px;
      text-align: center;
      color: #00f5c8;
      margin-bottom: 12px;
    }

    /* ── STATS ── */
    .stats-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 4px;
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-num {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: min(7vw, 4.5vh);
      line-height: 1;
      letter-spacing: -1px;
      color: #fff;
    }

    .stat-symbol {
      font-size: 0.5em;
      color: rgba(255,255,255,0.55);
      display: inline-block;
      transform: rotate(-10deg);
      position: relative;
      top: -0.15em;
      margin-right: 1px;
    }
    .stat-symbol-suffix {
      font-size: 0.5em;
      color: rgba(255,255,255,0.55);
      display: inline-block;
      transform: rotate(10deg);
      position: relative;
      top: -0.15em;
      margin-left: 1px;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.55);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 3px;
    }

    .stats-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      flex-shrink: 0;
      margin: 0 8px;
      margin-bottom: 18px;
    }

    /* ── PLAY NOW ── */
    .btn-play {
      display: block;
      width: 100%;
      background: #2dd632;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 19px;
      letter-spacing: 0.5px;
      text-align: center;
      text-decoration: none;
      padding: 18px;
      border-radius: 50px;
      border: 2.5px solid #101010;
      box-shadow: 0 5px 0 #0a3b0c, 3px 8px 0 rgba(0,0,0,0.35);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero-content">

      <!-- WIN starburst -->
      <div class="win-wrap">
        <svg class="win-star" viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg">
          <!-- 10-point starburst / splat -->
          <polygon
            points="110,10 125,65 175,30 145,80 200,80 158,112 185,160 130,135 110,170 90,135 35,160 62,112 20,80 75,80 45,30 95,65"
            fill="#9b3ee8"
          />
        </svg>
        <span class="win-text">WIN</span>
      </div>

      <!-- REAL REWARDS -->
      <div class="real-rewards">REAL<br>REWARDS</div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat">
          <div class="stat-num"><span class="stat-symbol">$</span>100K</div>
          <div class="stat-label">Prize Pool</div>
        </div>
        <div class="stats-dot"></div>
        <div class="stat">
          <div class="stat-num">60K<span class="stat-symbol-suffix">+</span></div>
          <div class="stat-label">Cards</div>
        </div>
      </div>

      <a href="https://gib.meme/" class="btn-play">Play Now</a>

    </div>
  </div>
</body>
</html>
